name: starby_mobile
description: StarbyMobile - GPS定位追踪设备管理平台

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # 地图 - flutter_map (使用高德地图瓦片)
  flutter_map: ^7.0.0
  latlong2: ^0.9.0

  # 状态管理
  provider: ^6.1.0

  # 网络请求
  dio: ^5.4.0
  dio_cookie_manager: ^3.1.1

  # 本地存储
  shared_preferences: ^2.2.2

  # 图片加载
  cached_network_image: ^3.3.1

  # 权限管理
  permission_handler: ^11.3.0

  # 推送 - 极光（国内首选）
  jpush_flutter: ^3.0.0

  # UI组件
  flutter_screenutil: ^5.9.0
  flutter_svg: ^2.0.9

  # 工具
  intl: ^0.20.2
  device_info_plus: ^10.1.0

  # WebSocket
  web_socket_channel: ^2.4.0

  # URL Launcher (用于导航)
  url_launcher: ^6.2.0

  # 图片选择和相机
  image_picker: ^1.0.7

  # 分享功能
  share_plus: ^7.2.1

  # 文件路径
  path_provider: ^2.1.1

  # 二维码扫描
  mobile_scanner: ^4.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app.png"

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/fonts/
